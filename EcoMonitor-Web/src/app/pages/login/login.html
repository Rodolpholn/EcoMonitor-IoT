<div class="login-wrapper">
  <div class="side-blue">
    <div class="brand-box">
      <!-- <i class="bi bi-cpu logo-icon"></i> -->
      <img
        src="LogoThermofrio.png"
        alt="Thermofrio Logo"
        style="width: 100%; max-width: 300px; height: auto; object-fit: contain"
      />
      <p>Plataforma de monitoramento inteligente de ambientes.</p>
      <div class="info-badge">
        <i class="bi bi-shield-lock-fill me-2"></i>
        Acesso restrito — solicite suas credenciais ao administrador.
      </div>
    </div>
  </div>

  <div class="side-form">
    <div class="logo-mobile mb-5 d-md-none text-center">
      <img
        src="LogoThermofrio.png"
        alt="Thermofrio Logo"
        style="width: 100%; max-width: 220px; height: auto; object-fit: contain"
      />
    </div>

    <div class="form-box">
      <h1 class="text-center">Bem-vindo</h1>
      <p class="subtitle text-center">Entre com suas credenciais</p>

      <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()">
        <div class="input-group-custom">
          <i class="bi bi-envelope input-icon"></i>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="Email"
            class="custom-input"
            required
            autocomplete="email"
          />
        </div>
        <div class="input-group-custom">
          <i class="bi bi-lock input-icon"></i>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Senha"
            class="custom-input"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn-login" [disabled]="isLoading">
          <span
            *ngIf="isLoading"
            class="spinner-border spinner-border-sm me-2"
            role="status"
            aria-hidden="true"
          ></span>
          <i *ngIf="!isLoading" class="bi bi-box-arrow-in-right me-2"></i>
          {{ isLoading ? 'Entrando...' : 'ENTRAR' }}
        </button>
      </form>

      <p class="footer-note mt-4">
        <i class="bi bi-info-circle me-1"></i>
        Não possui acesso? Contate o administrador do sistema.
      </p>
    </div>
  </div>
</div>
