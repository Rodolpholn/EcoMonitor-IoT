<div class="login-wrapper">
  <div class="side-blue">
    <div class="brand-box">
      <i class="bi bi-cpu logo-icon"></i>
      <h2>EcoMonitor</h2>
      <p>Sua plataforma de monitoramento inteligente.</p>
    </div>
  </div>

  <div class="side-form">
    <div class="form-box">
      <h1>Welcome</h1>
      <p class="subtitle">Login in to your account to continue</p>

      <form>
        <div class="input-group">
          <input type="email" placeholder="Email" class="custom-input" />
        </div>
        <div class="input-group">
          <input type="password" placeholder="Password" class="custom-input" />
        </div>

        <a href="#" class="forgot-link">Forgot your password?</a>

        <button type="submit" class="btn-login">LOG IN</button>

        <p class="signup-text">Don't have an account? <a href="#">Sign Up</a></p>
      </form>
    </div>
  </div>
</div>
