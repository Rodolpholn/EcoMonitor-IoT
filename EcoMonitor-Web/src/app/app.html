<div class="container mt-5">
  <div class="row">
    <div class="col">
      <h1 class="text-primary mb-4">
        <i class="bi bi-thermometer-half"></i> EcoMonitor - Dashboard
      </h1>

      <div class="card shadow">
        <div class="card-header bg-dark text-white">
          <h5 class="mb-0">Últimas Leituras do Sensor</h5>
        </div>
        <div class="card-body">
          <table class="table table-hover">
            <thead class="table-light">
              <tr>
                <th>Data/Hora</th>
                <th>Temperatura</th>
                <th>Umidade</th>
                <th>Status LED</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of leituras">
                <td>{{ item.dataHora | date: 'dd/MM/yyyy HH:mm:ss' }}</td>
                <td>{{ item.temperatura }}°C</td>
                <td>{{ item.umidade }}%</td>
                <td>
                  <span class="badge" [ngClass]="item.ledLigado ? 'bg-success' : 'bg-danger'">
                    {{ item.ledLigado ? 'Ligado' : 'Desligado' }}
                  </span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
