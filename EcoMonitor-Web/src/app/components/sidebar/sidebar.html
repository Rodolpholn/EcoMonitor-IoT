<div
  class="bg-primary text-white shadow d-none d-md-block"
  id="sidebar-wrapper"
  style="width: 250px; min-height: 100vh"
>
  <div class="sidebar-heading p-4 border-bottom border-light text-center">
    <img
      src="LogoThermofrio.png"
      alt="Thermofrio Logo"
      style="width: 100%; max-width: 180px; height: auto; object-fit: contain"
    />
  </div>

  <div class="list-group list-group-flush p-2" *ngIf="session$ | async as session">
    <a
      routerLink="/dashboard"
      routerLinkActive="active-desktop"
      class="list-group-item list-group-item-action bg-primary text-white border-0 rounded-3 mb-2"
    >
      <i class="bi bi-grid-1x2-fill me-2"></i> Dashboard
    </a>
    <a
      routerLink="/sensores-iot"
      routerLinkActive="active-desktop"
      class="list-group-item list-group-item-action bg-primary text-white border-0 rounded-3 mb-2"
    >
      <i class="bi bi-cpu-fill me-2"></i> Sensores IoT
    </a>
    <a
      *ngIf="session.role === 'admin'"
      routerLink="/admin-panel"
      routerLinkActive="active-desktop"
      class="list-group-item list-group-item-action bg-primary text-white border-0 rounded-3 mb-2"
    >
      <i class="bi bi-people-fill me-2"></i> Painel Admin
    </a>

    <a
      (click)="logout()"
      style="cursor: pointer"
      class="list-group-item list-group-item-action bg-primary text-white border-0 rounded-3 mt-5 text-warning"
    >
      <i class="bi bi-door-open-fill me-2"></i> Sair
    </a>
  </div>
</div>

<nav class="navigation d-flex d-md-none" *ngIf="session$ | async as session">
  <ul>
    <li class="list" [class.active]="router.url === '/dashboard'">
      <a routerLink="/dashboard">
        <span class="icon"><i class="bi bi-grid-1x2-fill"></i></span>
        <span class="text">Dashboard</span>
      </a>
    </li>

    <li class="list" [class.active]="router.url === '/sensores-iot'">
      <a routerLink="/sensores-iot">
        <span class="icon"><i class="bi bi-cpu-fill"></i></span>
        <span class="text">Sensores</span>
      </a>
    </li>

    <li
      class="list"
      [class.active]="router.url === '/admin-panel'"
      *ngIf="session.role === 'admin'"
    >
      <a routerLink="/admin-panel">
        <span class="icon"><i class="bi bi-people-fill"></i></span>
        <span class="text">Admin</span>
      </a>
    </li>

    <div class="indicator" [style.transform]="getIndicatorTransform(session.role ?? '')"></div>
  </ul>
</nav>
